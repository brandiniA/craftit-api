# Local PostgreSQL (parity with Supabase / production Postgres).
#
#   docker compose up -d
#   bin/rails db:prepare
#
# Adminer (DB UI): http://localhost:8080
#   System: PostgreSQL  Server: postgres  User: postgres  Password: postgres
#   Database: craftit_api_development (or craftit_api_test)
#
# Connection defaults match config/database.yml (postgres/postgres@localhost:5432).

services:
  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: craftit_api_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
